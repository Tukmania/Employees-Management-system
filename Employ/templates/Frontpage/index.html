<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>
<body>
  {% verbatim %}
    <nav class="navbar navbar-default">
        <div class="container-fluid">
          <!-- Brand and toggle get grouped for better mobile display -->
          <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
              <span class="sr-only">Toggle navigation</span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="#">vue</a>
          </div>
      
          <!-- Collect the nav links, forms, and other content for toggling -->
          <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <ul class="nav navbar-nav">
              <li v-for="(page, index) in pages" :key="index" class="nav-link">
                <a :class="{active: activePage == index}"
                   :href="page.link.url"
                   :title="`This link goes to the ${page.link.text} page`"
                   @click.prevent="actionPage = index">
                   [[ page.link.text ]] 
                   <span class="sr-only">(current)</span>
                </a>
              </li>
            </ul>
          </div>
      </nav>
{% endverbatim %}
      {% verbatim %}
      <div id="app">
        <h1>[[ pages[actionPage].pageTitle ]]</h1>
        <p>[[ pages[actionPage].content ]]</p>
      </div>
      {% endverbatim %}
      
      <script src="https://unpkg.com/vue@3"></script>
      <script>
        Vue.createApp({
          delimiters: ['[[', ']]'],
          data() {
            return {
              actionPage: 0,
              pages: [
                {
                  link: {text:'Home', url: 'home.html'}, 
                  pageTitle: 'Hello World',
                  content: 'This is my first vue project'
                },
                {
                  link: {text:'About', url: 'about.html'},
                  pageTitle: 'About',
                  content: 'This is my first vue project'
                },
                {
                  link: {text:'Contact', url: 'contact.html'},
                  pageTitle: 'Contact',
                  content: 'This is my first vue project'
                }
              ]
            };
          }
        }).mount('#app');
      </script>

</body>
</html>
